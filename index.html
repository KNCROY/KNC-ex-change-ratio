<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNC 업무용 환율 정보</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; width: 100%; position: relative; }
        
        /* 언어 선택기 스타일 추가 */
        .lang-selector { position: absolute; top: 15px; right: 15px; }
        .lang-selector select { padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 0.85em; background-color: #fff; cursor: pointer; }

        /* 상단 헤더 (로고 + 제목) 스타일 */
        .header-box { display: flex; align-items: center; justify-content: center; margin-top: 15px; margin-bottom: 20px; border-bottom: 2px solid #003366; padding-bottom: 15px; }
        .header-box img { height: 45px; margin-right: 15px; }
        h2 { color: #003366; margin: 0; letter-spacing: -1px; font-size: 1.25em; text-align: left; display: flex; align-items: center; flex-wrap: wrap; justify-content: center;}
        
        .rate-box { background: #eef2f5; padding: 18px; border-radius: 8px; margin-bottom: 15px; }
        .currency-title { font-size: 1.0em; color: #333; margin-bottom: 10px; font-weight: bold; border-left: 4px solid #0056b3; padding-left: 8px;}
        .current-value { font-size: 1.6em; font-weight: bold; color: #0056b3; text-align: right; }
        
        /* 과거 환율 표시 영역 */
        .history-value { font-size: 0.9em; color: #555; text-align: right; margin-top: 5px; background: #fff; padding: 12px 10px; border-radius: 5px; border: 1px solid #ddd; line-height: 1.8; }
        
        /* 등락 색상 */
        .up { color: #d92525; font-weight: bold; }
        .down { color: #0056b3; font-weight: bold; }
        
        .update-time { text-align: center; font-size: 0.85em; color: #888; margin-top: 15px; margin-bottom: 20px; }
        
        button { display: block; width: 100%; padding: 12px; background-color: #003366; color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #002244; }
        
        /* 과거 환율 조회 영역 스타일 */
        .search-box { background: #fdfdfd; border: 1px solid #ccc; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .search-box h3 { margin-top: 0; margin-bottom: 10px; font-size: 1.05em; color: #333; text-align: center; }
        .search-box input[type="date"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; margin-bottom: 10px; box-sizing: border-box; }
        .search-btn { background-color: #555; font-size: 1em; padding: 10px; }
        .search-btn:hover { background-color: #333; }
        
        .search-result { margin-top: 15px; background: #eef2f5; padding: 12px; border-radius: 5px; display: none; }
        .search-result p { margin: 5px 0; font-size: 1.05em; color: #333; display: flex; justify-content: space-between; font-weight: bold;}
        .search-result span { color: #0056b3; }

        .source-info { text-align: center; font-size: 0.75em; color: #a0a0a0; margin-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 언어 선택 드롭다운 -->
        <div class="lang-selector">
            <select id="lang-select" onchange="changeLanguage(this.value)">
                <option value="ko">한국어</option>
                <option value="en">English</option>
                <option value="vi">Tiếng Việt</option>
            </select>
        </div>

        </div>
        
        <div class="rate-box">
            <div class="currency-title" data-i18n="usd-krw-title">고객사 발주시 적용 환율 (USD-KRW)</div>
            <div class="current-value" id="usd-krw-current" data-i18n="loading">로딩중...</div>
            <div class="history-value" id="usd-krw-hist" data-i18n="loading-hist">데이터를 불러오는 중입니다...</div>
        </div>
        
        <div class="rate-box">
            <div class="currency-title" data-i18n="usd-vnd-title">베트남 환율 현황 (USD-VND)</div>
            <div class="current-value" id="usd-vnd-current" data-i18n="loading">로딩중...</div>
            <div class="history-value" id="usd-vnd-hist" data-i18n="loading-hist">데이터를 불러오는 중입니다...</div>
        </div>

        <div class="rate-box">
            <div class="currency-title" data-i18n="cny-krw-title">경쟁사 단가 비교용 환율 (CNY-KRW)</div>
            <div class="current-value" id="cny-krw-current" data-i18n="loading">로딩중...</div>
            <div class="history-value" id="cny-krw-hist" data-i18n="loading-hist">데이터를 불러오는 중입니다...</div>
        </div>

        <button onclick="fetchRates()" data-i18n="refresh-btn">🔄 당일 환율 데이터 새로고침</button>
        <div class="update-time" id="last-update"></div>

        <div class="search-box">
            <h3 data-i18n="search-title">📅 과거 환율 조회</h3>
            <input type="date" id="history-date">
            <button class="search-btn" onclick="fetchSpecificDateRates()" data-i18n="search-btn">조회하기</button>
            
            <div class="search-result" id="search-result-box">
                <div style="text-align: center; font-size: 0.9em; color: #666; margin-bottom: 10px;" id="search-result-title"></div>
                <p>USD - KRW <span><span id="search-usd-krw">-</span></span></p>
                <p>USD - VND <span><span id="search-usd-vnd">-</span></span></p>
                <p>CNY - KRW <span><span id="search-cny-krw">-</span></span></p>
            </div>
        </div>

        <div class="source-info">Data provided by Currency-API</div>
    </div>

    <script>
        // --- 1. 다국어 번역 사전 ---
        const translations = {
            'ko': {
                'main-title': 'KNC 업무용 환율 정보',
                'usd-krw-title': '고객사 발주시 적용 환율 (USD-KRW)',
                'usd-vnd-title': '베트남 환율 현황 (USD-VND)',
                'cny-krw-title': '경쟁사 단가 비교용 환율 (CNY-KRW)',
                'refresh-btn': '🔄 당일 환율 데이터 새로고침',
                'search-title': '📅 과거 환율 조회',
                'search-btn': '조회하기',
                'loading': '로딩중...',
                'loading-hist': '데이터를 불러오는 중입니다...',
                '1yr-ago': '1년 전',
                '2yr-ago': '2년 전',
                'vs-1yr': '1년 전 대비',
                'last-update': '최종 업데이트: ',
                'error-alert': '당일 및 과거 데이터를 불러오는 중 오류가 발생했습니다.',
                'no-data-alert': '해당 날짜의 데이터가 없습니다.',
                'select-date-alert': '날짜를 선택해주세요.',
                'searching': '환율 불러오는 중...',
                'base-rate': '기준 환율'
            },
            'en': {
                'main-title': 'KNC Corporate Exchange Rates',
                'usd-krw-title': 'Order Applied Rate (USD-KRW)',
                'usd-vnd-title': 'Vietnam Exchange Rate (USD-VND)',
                'cny-krw-title': 'Competitor Comparison Rate (CNY-KRW)',
                'refresh-btn': '🔄 Refresh Today\'s Rates',
                'search-title': '📅 Historical Rates Search',
                'search-btn': 'Search',
                'loading': 'Loading...',
                'loading-hist': 'Loading data...',
                '1yr-ago': '1 yr ago',
                '2yr-ago': '2 yrs ago',
                'vs-1yr': 'vs 1 yr ago',
                'last-update': 'Last updated: ',
                'error-alert': 'Error occurred while loading data.',
                'no-data-alert': 'No data available for the selected date.',
                'select-date-alert': 'Please select a date.',
                'searching': 'Loading rates...',
                'base-rate': 'Base Rate'
            },
            'vi': {
                'main-title': 'Tỷ giá hối đoái nội bộ KNC',
                'usd-krw-title': 'Tỷ giá áp dụng đặt hàng (USD-KRW)',
                'usd-vnd-title': 'Tỷ giá hối đoái VN (USD-VND)',
                'cny-krw-title': 'Tỷ giá so sánh đối thủ (CNY-KRW)',
                'refresh-btn': '🔄 Làm mới tỷ giá hôm nay',
                'search-title': '📅 Tra cứu tỷ giá trong quá khứ',
                'search-btn': 'Tìm kiếm',
                'loading': 'Đang tải...',
                'loading-hist': 'Đang tải dữ liệu...',
                '1yr-ago': '1 năm trước',
                '2yr-ago': '2 năm trước',
                'vs-1yr': 'so với 1 năm trước',
                'last-update': 'Cập nhật lần cuối: ',
                'error-alert': 'Đã xảy ra lỗi khi tải dữ liệu.',
                'no-data-alert': 'Không có dữ liệu cho ngày đã chọn.',
                'select-date-alert': 'Vui lòng chọn ngày.',
                'searching': 'Đang tải tỷ giá...',
                'base-rate': 'Tỷ giá cơ bản'
            }
        };

        let currentLang = 'ko'; // 기본 언어

        // --- 2. 언어 감지 및 적용 함수 ---
        function detectAndSetLanguage() {
            // 브라우저 언어 감지 (예: ko-KR -> ko)
            const browserLang = navigator.language.slice(0, 2); 
            if (translations[browserLang]) {
                currentLang = browserLang;
            } else {
                currentLang = 'en'; // 지원하지 않는 언어면 영어로
            }
            document.getElementById('lang-select').value = currentLang;
            applyTranslations();
        }

        function changeLanguage(langCode) {
            currentLang = langCode;
            applyTranslations();
            fetchRates(); // 언어가 바뀌면 화면 텍스트(로딩, 업데이트 시간 등)를 새로 그리기 위해 호출
        }

        function applyTranslations() {
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang][key]) {
                    el.innerText = translations[currentLang][key];
                }
            });
        }

        // --- 3. 기존 기능 (언어 번역 적용) ---
        function setTodayDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const date = String(today.getDate()).padStart(2, '0');
            
            document.getElementById('title-date').innerText = `(${year}.${month}.${date})`;
            
            const dateInput = document.getElementById('history-date');
            const todayStr = `${year}-${month}-${date}`;
            dateInput.max = todayStr;
            dateInput.value = todayStr;
        }

        function renderRate(elementId, current, historical1, historical2, fractionDigits, prefix) {
            const diff1 = current - historical1;
            const diffPercent1 = ((diff1 / historical1) * 100).toFixed(2);
            let colorClass1 = ''; let sign1 = '';
            if (diff1 > 0) { colorClass1 = 'up'; sign1 = '▲'; } 
            else if (diff1 < 0) { colorClass1 = 'down'; sign1 = '▼'; }
            else { sign1 = '-'; }

            const diff2 = current - historical2;
            const diffPercent2 = ((diff2 / historical2) * 100).toFixed(2);
            let colorClass2 = ''; let sign2 = '';
            if (diff2 > 0) { colorClass2 = 'up'; sign2 = '▲'; } 
            else if (diff2 < 0) { colorClass2 = 'down'; sign2 = '▼'; }
            else { sign2 = '-'; }

            const currentStr = current.toLocaleString('en-US', {maximumFractionDigits: fractionDigits});
            const hist1Str = historical1.toLocaleString('en-US', {maximumFractionDigits: fractionDigits});
            const hist2Str = historical2.toLocaleString('en-US', {maximumFractionDigits: fractionDigits});
            
            const diff1Str = Math.abs(diff1).toLocaleString('en-US', {maximumFractionDigits: fractionDigits});
            const diff2Str = Math.abs(diff2).toLocaleString('en-US', {maximumFractionDigits: fractionDigits});

            document.getElementById(elementId + '-current').innerText = prefix + ' ' + currentStr;
            
            // 번역 적용된 텍스트로 삽입
            const t = translations[currentLang];
            document.getElementById(elementId + '-hist').innerHTML = 
                `${t['1yr-ago']}: ${hist1Str} <span class="${colorClass1}" style="margin-left:5px;">(${t['vs-1yr']}: ${sign1} ${diff1Str} / ${diffPercent1}%)</span><br>
                 ${t['2yr-ago']}: ${hist2Str} <span class="${colorClass2}" style="margin-left:5px;">(${t['vs-1yr']}: ${sign2} ${diff2Str} / ${diffPercent2}%)</span>`;
        }

        async function fetchRates() {
            try {
                const today = new Date();
                
                const lastYearDate = new Date(today.getFullYear() - 1, today.getMonth(), today.getDate());
                const twoYearsAgoDate = new Date(today.getFullYear() - 2, today.getMonth(), today.getDate());
                
                const lastYearStr = lastYearDate.toISOString().split('T')[0];
                const twoYearsStr = twoYearsAgoDate.toISOString().split('T')[0];

                const currentUrl = `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json?v=${new Date().getTime()}`;
                const hist1Url = `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${lastYearStr}/v1/currencies/usd.json`;
                const hist2Url = `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${twoYearsStr}/v1/currencies/usd.json`;

                const [resCurrent, resHist1, resHist2] = await Promise.all([
                    fetch(currentUrl), 
                    fetch(hist1Url),
                    fetch(hist2Url)
                ]);
                
                const dataCurrent = await resCurrent.json();
                const dataHist1 = await resHist1.json();
                const dataHist2 = await resHist2.json();

                const curUSD = dataCurrent.usd;
                const hist1USD = dataHist1.usd;
                const hist2USD = dataHist2.usd;

                renderRate('usd-krw', curUSD.krw, hist1USD.krw, hist2USD.krw, 2, '₩');
                renderRate('usd-vnd', curUSD.vnd, hist1USD.vnd, hist2USD.vnd, 0, '₫');
                
                const curCnyKrw = curUSD.krw / curUSD.cny;
                const hist1CnyKrw = hist1USD.krw / hist1USD.cny;
                const hist2CnyKrw = hist2USD.krw / hist2USD.cny;
                
                renderRate('cny-krw', curCnyKrw, hist1CnyKrw, hist2CnyKrw, 2, '₩');

                const now = new Date();
                const timeStr = now.toLocaleTimeString(currentLang === 'ko' ? 'ko-KR' : 'en-US');
                document.getElementById('last-update').innerText = `${translations[currentLang]['last-update']} ${timeStr}`;
                
            } catch (error) {
                alert(translations[currentLang]['error-alert']);
            }
        }

        async function fetchSpecificDateRates() {
            const selectedDate = document.getElementById('history-date').value;
            if (!selectedDate) {
                alert(translations[currentLang]['select-date-alert']);
                return;
            }

            const resultBox = document.getElementById('search-result-box');
            resultBox.style.display = 'block';
            document.getElementById('search-result-title').innerText = `[ ${selectedDate} ] ${translations[currentLang]['searching']}`;
            
            try {
                const url = `https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@${selectedDate}/v1/currencies/usd.json`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error("데이터 없음");
                
                const data = await response.json();
                const usd = data.usd;
                
                const cnyKrw = usd.krw / usd.cny;

                document.getElementById('search-usd-krw').innerText = '₩ ' + usd.krw.toLocaleString('en-US', {maximumFractionDigits: 2});
                document.getElementById('search-usd-vnd').innerText = '₫ ' + usd.vnd.toLocaleString('en-US', {maximumFractionDigits: 0});
                document.getElementById('search-cny-krw').innerText = '₩ ' + cnyKrw.toLocaleString('en-US', {maximumFractionDigits: 2});
                document.getElementById('search-result-title').innerText = `[ ${selectedDate} ${translations[currentLang]['base-rate']} ]`;

            } catch (error) {
                alert(translations[currentLang]['no-data-alert']);
                resultBox.style.display = 'none';
            }
        }

        // --- 4. 실행 ---
        setTodayDate();
        detectAndSetLanguage(); // 브라우저 언어 감지 및 번역 실행
        fetchRates();

        // 1시간(3600000 밀리초)마다 자동으로 fetchRates 함수를 다시 실행합니다.
        setInterval(fetchRates, 3600000); 
    </script>
